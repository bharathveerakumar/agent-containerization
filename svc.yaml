apiVersion: v1
kind: Service
metadata:
  annotations:
    meta.helm.sh/release-name: site24x7-agent
    meta.helm.sh/release-namespace: default
  labels:
    app.kubernetes.io/component: exporter
    app.kubernetes.io/instance: site24x7-kube-state-metrics
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: site24x7
    app.kubernetes.io/version: 2.17.0
    helm.sh/chart: site24x7-0.2.9
  name: site24x7-kube-state-metrics
  namespace: default
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: http-metrics
    port: 8080
    protocol: TCP
    targetPort: http-metrics
  - name: telemetry
    port: 8081
    protocol: TCP
    targetPort: telemetry
  selector:
    app.kubernetes.io/name: site24x7-kube-state-metrics
  type: NodePort
status:
  loadBalancer: {}
